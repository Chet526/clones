name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e . -r requirements-dev.txt
          pip install pip-audit
      - name: Dependency vulnerability audit
        run: python -m pip_audit -r requirements.txt
      - name: Test
        run: python -m pytest -q
      - name: Test Netlify functions
        run: node --test site/functions/tests/*.test.cjs
      - name: Check front-end syntax
        run: |
          node --check src/geobrief/webapp/static/app.js
          node --check site/public/app.js
